services:
  - type: web
    name: smartstore-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000
